<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro e Listagem de Clientes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Cadastro e Listagem de Clientes</h1>
    <p>Bem vindo, aqui você pode cadastrar, visualizar clientes e exclui-los de sua lista</p>

    <h2>Cadastro de clientes</h2>
    <form id="clienteForm">
        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome" required>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>

        <button id="cadastrarBtn" type="button">Cadastrar</button>
    </form>

    <h2>Lista de Clientes</h2>
    <ul id="listaClientes">

    </ul>
    <script type="module" src="/js/app.js"></script>
</body>
</html>
